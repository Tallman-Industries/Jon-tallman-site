server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Long cache for hashed Next static assets
  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Short cache for images and fonts
  location ~* \.(png|jpg|jpeg|webp|avif|svg|ico|woff2?|ttf)$ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # Clean URL support for trailingSlash: true static export
  location / {
    try_files $uri $uri/ $uri.html $uri/index.html /index.html;
  }

  error_page 404 /404.html;
  location = /404.html {
    internal;
  }
}
